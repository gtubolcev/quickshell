name: Build DEB (Ubuntu Noble, no Nix)

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (APT only)
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-shadertools-dev \
            qt6-svg-dev qt6-wayland-dev \
            libwayland-dev \
            wayland-protocols \
            libpipewire-0.3-dev \
            spirv-tools \

      - name: Configure (CMake)
        run: |
          cmake -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr \
                -DUSE_JEMALLOC=OFF

      - name: Build
        run: cmake --build build

      - name: Package (.deb via CPack)
        run: |
          cd build
          cpack -G DEB

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickshell-deb
          path: build/*.deb
