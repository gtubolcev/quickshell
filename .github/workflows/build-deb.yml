name: Build DEB (Ubuntu Noble, no Nix)

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (APT only)
        run: |
          sudo apt update
          sudo apt install -y libjemalloc-dev \
      - run: git clone https://github.com/jeremy-rifkin/cpptrace && cd cpptrace && cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release && sudo cmake --build build --target install && cd ..
git clone https://github.com/jeremy-rifkin/cpptrace && cd cpptrace && cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release && sudo cmake --build build --target install && cd ..
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-shadertools-dev \
            qt6-svg-dev qt6-wayland-dev qt6-wayland-private-dev libcli11-dev \
            libwayland-dev \
            wayland-protocols \
            libpipewire-0.3-dev \
            spirv-tools libxkbcommon-dev libdrm-dev libgbm-dev libegl1-mesa-dev libglib2.0-dev libpolkit-agent-1-dev \

      - name: Configure (CMake)
        run: |
          cmake -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release -DUSE_JEMALLOC=OFF
                -DCMAKE_INSTALL_PREFIX=/usr -DCRASH_REPORTER=OFF \
                -DUSE_JEMALLOC=OFF

      - name: Build
        run: cmake --build build

      - name: Package (.deb via CPack)
        run: |
          cd build
          cpack -G DEB

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickshell-deb
          path: build/*.deb
