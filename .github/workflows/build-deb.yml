name: Build DEB (Ubuntu Noble)

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Disable crash module
        run: sed -i 's/add_subdirectory(crash)/#add_subdirectory(crash)/' src/CMakeLists.txt

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-declarative-dev qt6-wayland-dev qt6-shadertools-dev \
            qt6-base-private-dev qt6-declarative-private-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev libegl-dev \
            libxcb1-dev libpipewire-0.3-dev libglib2.0-dev \
            libpolkit-agent-1-dev libpolkit-gobject-1-dev \
            libpam0g-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/usr

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          cd build
          cpack -G DEB

      - uses: actions/upload-artifact@v4
        with:
          name: quickshell-deb
          path: build/*.deb
